version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: worksync-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: worksync
      POSTGRES_PASSWORD: worksync_password
      POSTGRES_DB: worksync
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - worksync-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worksync"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: worksync-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "postgresql://worksync:worksync_password@postgres:5432/worksync?schema=public"
      JWT_SECRET: "worksync_super_secret_jwt_key_999888"
      PORT: 4000
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - api_uploads:/app/uploads
    networks:
      - worksync-network

  nextjs-app:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://api:4000
    container_name: worksync-nextjs
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://api:4000"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}"
    depends_on:
      - api
    networks:
      - worksync-network

networks:
  worksync-network:
    driver: bridge

volumes:
  postgres_data:
  api_uploads:
